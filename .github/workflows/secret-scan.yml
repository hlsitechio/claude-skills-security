name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history rescan to catch anything that snuck in
    - cron: "17 4 * * 1"

# Eat-our-own-dogfood: minimal token + SHA-pinned actions.
permissions: {}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # for SARIF upload
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If a paid scanner is wired up later, drop the LICENSE here;
          # the OSS scanner works fine for our purposes.
        with:
          # Fail the build on any finding; upload SARIF so it shows
          # in the GitHub Security tab.
          config-path: .github/gitleaks.toml

  # A second pass that lints skill content for "GOOD" examples
  # that contain look-alike secrets. We don't want a placeholder
  # like `sk_live_REPLACE_ME` to be flagged forever, but a real
  # leak masquerading as an example should be caught.
  no-real-secrets-in-examples:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Scan markdown for high-entropy strings outside known placeholders
        run: |
          python <<'EOF'
          import os, re, sys

          # High-entropy regex (base64-ish, >= 32 chars)
          ENTROPY = re.compile(r'[A-Za-z0-9+/=_-]{32,}')
          # Known-safe placeholders / patterns we use in examples
          ALLOWED = (
              'REPLACE', 'PLACEHOLDER', 'EXAMPLE', 'YOUR_', 'XXXX', '...',
              'abcdefg', '1234567890', 'cafebabe',
              # Common CVE/hash IDs we cite legitimately
              'CVE-', 'GHSA-', 'sha256-', 'sha384-', 'sha512-',
              # Our own well-known SHA pins
              '11bd71901bbe5b1630ceea73d27597364c9af683',
              'a26af69be951a213d495a4c3e4e4022e16d87065',
              'ff98106e4c7b2bc287b24eaf42907196329070c7',
              'cbda684547adc8c052d50711417e44fe2bc6e478',
          )
          # Plus: hex SHAs in `actions-hardening.md` and templates
          # are intentional pin examples — accept them.

          hits = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', 'node_modules', 'dist')]
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  p = os.path.join(root, f)
                  with open(p, encoding='utf-8', errors='ignore') as fh:
                      text = fh.read()
                  for m in ENTROPY.finditer(text):
                      s = m.group(0)
                      if any(a in s for a in ALLOWED):
                          continue
                      # Skip if line contains a label suggesting placeholder
                      line_start = text.rfind('\n', 0, m.start()) + 1
                      line_end = text.find('\n', m.end())
                      line = text[line_start:line_end]
                      if any(a in line for a in ALLOWED):
                          continue
                      hits.append(f'{p}:{text.count(chr(10), 0, m.start())+1}: {s[:48]}...')

          if hits:
              print(f'Possible secret-like strings in skill content ({len(hits)}):')
              for h in hits:
                  print(f'  {h}')
              sys.exit(1)
          print('No high-entropy strings outside allowed placeholders.')
          EOF
