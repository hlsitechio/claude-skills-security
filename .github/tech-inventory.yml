    current_pin: "gcr.io/distroless/nodejs20-debian12:nonroot"
    last_verified: "2026-05-23"
    drift_risk: |
      The `nodejs20` tag rebuilds with current 20.x patch; the `debian12`
      base is rebuilt on Debian security advisories. If a Debian 13
      variant becomes the recommended track, this pin should follow.

  - id: alpine-base
    kind: base_image
    source:
      type: docker_hub
      image: alpine
      track: stable
    pinned_in:
      - saas-security-pack/iac-container-security/references/dockerfile-hardening.md
    current_pin: "alpine:3.19 (EOL — bump to 3.21 or 3.22)"
    last_verified: "2026-05-23"
    drift_severity: high
    drift_risk: |
      Alpine 3.19 reached end-of-support November 2025. 3.21 / 3.22
      are current. Old Alpine ships old musl, old apk packages,
      unpatched CVEs in busybox.

  - id: ubuntu-runner
    kind: base_image
    source:
      type: docker_hub
      image: ubuntu
      track: lts
    pinned_in:
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
    current_pin: "ubuntu-latest (24.04)"
    last_verified: "2026-05-23"
    drift_risk: |
      `runs-on: ubuntu-latest` follows GitHub's rollout — was 22.04,
      migrated to 24.04 during 2024. Guidance should not pin to
      `ubuntu-22.04` explicitly without reason.

  # ───────── GitHub Actions ─────────

  - id: actions-checkout
    kind: action
    source:
      type: github_releases
      repo: actions/checkout
      track: latest
    pinned_in:
      - saas-security-pack/github-supply-chain/references/actions-hardening.md
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
      - .github/workflows/validate-all.yml
    current_pin: "11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2"
    last_verified: "2026-05-23"
    drift_risk: |
      Action SHAs are the pin format we teach. When upstream releases
      a new minor/patch (security fix in checkout itself, dependency
      bump), the example SHA in our hardened-workflow.yml goes stale.
      Stale examples teach users to copy outdated SHAs.

  - id: actions-setup-node
    kind: action
    source:
      type: github_releases
      repo: actions/setup-node
      track: latest
    pinned_in:
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
    current_pin: "PLACEHOLDER-SHA  # v4.x"
    last_verified: "2026-05-23"
    drift_risk: |
      Placeholder is fine in a template, but a comment with the latest
      real major (v4.x) needs to keep up. v5 release would invalidate
      the comment.

  - id: actions-dependency-review
    kind: action
    source:
      type: github_releases
      repo: actions/dependency-review-action
      track: latest
    pinned_in:
      - saas-security-pack/github-supply-chain/references/dependency-review.md
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
    current_pin: "v4.x"
    last_verified: "2026-05-23"
    drift_risk: |
      Severity thresholds and license-deny list semantics have changed
      across major versions. Pinning to a major + tracking minors is
      the right pattern.

  - id: github-codeql-action
    kind: action
    source:
      type: github_releases
      repo: github/codeql-action
      track: latest
    pinned_in:
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
    current_pin: "v3.x"
    last_verified: "2026-05-23"
    drift_risk: |
      Query suite names (`security-extended`, `security-and-quality`)
      have changed across CodeQL versions. Old guidance can refer to
      removed suites.

  # ───────── Frameworks ─────────

  - id: nextjs-framework
    kind: framework
    source:
      type: npm
      package: next
      track: latest
    pinned_in:
      - appsec-stack-pack/nextjs-security/SKILL.md
      - appsec-stack-pack/nextjs-security/references/app-router-patterns.md
    current_pin: "14 (STALE — bump floor to 15.5.18 / 16.2.6 for May 2026 patch wave)"
    last_verified: "2026-05-23"
    drift_severity: critical
    drift_risk: |
      May 2026 patch wave landed 13 CVEs (cache poisoning, XSS, SSRF,
      DoS); React2Shell RCE through Next 15.4.8/15.5.7/16.0.7 fixes.
      CVE-2025-29927 middleware bypass affects pre-15.2.3. CVE-2025-49826
      cache poisoning (204), CVE-2025-59471 `/_next/image` 4GB OOM,
      GHSA-c4j6-fc7j-m34r WebSocket-upgrade SSRF, CVE-2025-66478 Server
      Action Flight RCE. Pre-15.x guidance is materially out of date.

  - id: django-framework
    kind: framework
    source:
      type: pypi
      package: django
      track: stable
    pinned_in:
      - appsec-stack-pack/django-security/SKILL.md
    current_pin: "4 (STALE — 4.2 LTS EOL Apr 2026 today; bump to 5.2 LTS)"
    last_verified: "2026-05-23"
    drift_severity: high
    drift_risk: |
      Django 4.2 LTS reaches EOL April 2026 (today). 5.2 LTS is the
      current LTS (supported to April 2028). Django 5.1 added
      `LoginRequiredMiddleware` (default-deny inversion) — guidance
      not covering `@login_not_required` audits misses a major control.
      Feb 2026 SQLi cluster (CVE-2024-53908) not in current SKILL.
      Composite primary keys (5.2) change `get_object_or_404(pk=...)`
      authz patterns.

  - id: fastapi-framework
    kind: framework
    source:
      type: pypi
      package: fastapi
      track: latest
    pinned_in:
      - appsec-stack-pack/fastapi-security/SKILL.md
    current_pin: null
    last_verified: "2026-05-23"
    drift_risk: |
      FastAPI 0.110+ changed dependency-injection caching semantics
      relevant to per-request auth. Pydantic v2 (default in recent
      FastAPI) changed validation error formats — skills with example
      error responses may show v1 shapes.

  - id: react-framework
    kind: framework
    source:
      type: npm
      package: react
      track: latest
    pinned_in:
      - appsec-stack-pack/react-security/SKILL.md
      - appsec-stack-pack/react-security/references/jsx-xss-sinks.md
    current_pin: "19.2.6 (LATEST — but RSC CVE cluster Dec 2025 requires 19.0.4+/19.1.5+/19.2.4+)"
    last_verified: "2026-05-23"
    drift_severity: critical
    drift_risk: |
      December 2025 React Server Components CVE cluster — CVE-2025-55182
      RCE (CVSS 10.0), CVE-2025-55183 source exposure, CVE-2025-55184,
      CVE-2025-67779, CVE-2026-23864. Patched in 19.0.4 / 19.1.5 / 19.2.4.
      React 19.2 introduced `<Activity>` (hidden mode unmounts effects)
      with subtle implications for components holding secrets.
      `experimental_taintObjectReference` / `experimental_taintUniqueValue`
      are the canonical mitigation for prop-leak class.

  # ───────── Tools ─────────

  - id: cosign-tool
    kind: tool
    source:
      type: github_releases
      repo: sigstore/cosign
      track: latest
    pinned_in:
