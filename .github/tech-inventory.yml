    current_pin: "implied 1.18+ in examples"
    upstream_latest:
      version: "1.25.x (Aug 2025); 1.23.8 / 1.24.2 for CVE-2025-22871 patches"
      as_of: "2026-05-24"
    drift_severity: medium
    drift_risk: |
      CVE-2025-22871 net/http chunked LF request smuggling — patched
      Go 1.23.8 / 1.24.2. Go 1.22+ ServeMux method/wildcard routing
      changes 405 semantics. FIPS 140-3 native mode
      (GODEBUG=fips140=on) replaces GOEXPERIMENT=boringcrypto in 1.24+.
    sources:
      - url: https://go.dev/blog/routing-enhancements
        title: "Go 1.22 ServeMux routing enhancements"
        accessed: "2026-05-24"
      - url: https://www.wiz.io/vulnerability-database/cve/cve-2025-22871
        title: "CVE-2025-22871 — Wiz vulnerability database"
        accessed: "2026-05-24"
      - url: https://go.dev/doc/security/fips140
        title: "Go FIPS 140-3 native mode"
        accessed: "2026-05-24"
    last_verified: "2026-05-24"

