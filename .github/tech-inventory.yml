# Tech Inventory — version drift surface for daily review
#
# Schema v3 (2026-05-24): every entry now carries a concrete
# `upstream_latest` version with `as_of` date AND a `sources` array of
# citation URLs with access dates. Daily reviews compare `current_pin`
# (what the skills mention) against `upstream_latest` and produce drift
# findings. The sources array is the verifiable provenance — auditors
# and reviewers can re-check the URL.
#
# Per-entry fields:
#   id               short identifier (kebab-case)
#   kind             runtime | base_image | action | framework | library | tool | protocol
#   upstream:        how to fetch "what's current"
#     type           github_releases | npm | pypi | docker_hub | official_endpoint
#     url            full upstream URL
#     track          lts | latest | stable
#   pinned_in        file paths in this repo where this tech is mentioned with a concrete version
#   current_pin      version / tag / SHA quoted in skill content (informational)
#   upstream_latest:
#     version        the actual latest stable / LTS / patched version
#     as_of          ISO date this value was last researched
#   drift_severity   critical | high | medium | low | (omitted if on-latest)
#   drift_risk       prose: what specifically becomes insecure if guidance lags
#   sources          array of { url, title, accessed } citation entries
#   last_verified    ISO date this entry was last reviewed end-to-end

technologies:

  # ───────── Runtimes ─────────

  - id: nodejs-runtime
    kind: runtime
    upstream:
      type: official_endpoint
      url: https://nodejs.org/dist/index.json
      track: lts
    pinned_in:
      - saas-security-pack/iac-container-security/references/dockerfile-hardening.md
      - saas-security-pack/github-supply-chain/assets/hardened-workflow.yml
    current_pin: "20.11.1 in examples"
    upstream_latest:
      version: "22.x active LTS; 20.x maintenance (latest 20.20.x)"
      as_of: "2026-05-24"
    drift_severity: high
    drift_risk: |
      Node 20 entered maintenance April 2026. Node 22 is active LTS.
      Patch releases continue to ship CVE fixes for undici, HTTP/2,
      OpenSSL backports. Example pin `20.11.1` is ~18 months stale.
    sources:
      - url: https://nodejs.org/en/about/previous-releases
        title: "Node.js release schedule"
        accessed: "2026-05-24"
      - url: https://github.com/nodejs/Release
        title: "Node.js Release working group"
        accessed: "2026-05-24"
    last_verified: "2026-05-24"

  - id: python-runtime
    kind: runtime
    upstream:
      type: official_endpoint
      url: https://www.python.org/downloads/
      track: stable
