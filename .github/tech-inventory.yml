    current_pin: null
    upstream_latest:
      version: "3.13.x stable; 3.12 active maintenance; 3.11 security only"
      as_of: "2026-05-24"
    drift_severity: medium
    drift_risk: |
      Python 3.8 EOL Oct 2024; 3.9 EOL Oct 2025; 3.10 EOL Oct 2026.
      Skills should not recommend SAST baselines for runtimes past EOL.
    sources:
