    last_verified: "2026-05-23"
    drift_risk: |
      Stable; review yearly. If/when TLS 1.4 is standardized or 1.2 is
      formally deprecated for compliance frameworks (PCI DSS 4.0
      removed TLS 1.0/1.1 entirely; next revisions may tighten 1.2),
      update guidance.

  - id: oauth-pkce
    kind: protocol
    source:
