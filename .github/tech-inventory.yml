    last_verified: "2026-05-23"
    drift_severity: critical
    drift_risk: |
      CVE-2025-49844 "RediShell" — Lua use-after-free → RCE affects ALL
      versions until 6.2.20 / 7.2.11 / 7.4.6 / 8.0.4 / 8.2.2 (Oct 2025).
      Highest-impact Redis CVE in years. CVE-2025-21605 unauth output-
      buffer DoS. Redis 8 introduced new ACL categories for bundled
      modules (@search, @json, @timeseries, @bloom) — existing `+@all`
      grants now expose more. ACL selectors (Redis 7.2+) and `MODULE
      LOAD` restriction are new audit surfaces.

