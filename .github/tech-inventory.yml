      cookies, antiforgery tokens, OIDC state.
    sources:
      - url: https://www.microsoft.com/en-us/msrc/blog/2025/10/understanding-cve-2025-55315
        title: "Understanding CVE-2025-55315 — Microsoft Security Response Center"
        accessed: "2026-05-24"
      - url: https://andrewlock.net/understanding-the-worst-dotnet-vulnerability-request-smuggling-and-cve-2025-55315/
        title: "Andrew Lock — Understanding the worst .NET vulnerability"
        accessed: "2026-05-24"
      - url: https://startdebugging.net/2026/04/dotnet-10-0-7-oob-cve-2026-40372-dataprotection/
        title: ".NET 10.0.7 out-of-band CVE-2026-40372 DataProtection"
        accessed: "2026-05-24"
    last_verified: "2026-05-24"

