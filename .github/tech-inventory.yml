    last_verified: "2026-05-23"
    drift_risk: |
      Cross-browser support determines when guidance can recommend
      Trusted Types as a hard requirement vs Chromium-only hardening.
      Check Safari Tech Preview and Firefox release notes.

  - id: private-network-access
    kind: protocol
    source:
      type: official_endpoint
      url: https://wicg.github.io/private-network-access/
