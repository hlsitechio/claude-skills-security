    current_pin: "v2.x (STALE — Cosign v3 GA mid-2025; bump examples)"
    last_verified: "2026-05-23"
    drift_severity: medium
    drift_risk: |
      Cosign 3 GA mid-2025 flipped `--new-bundle-format` and
      `--trusted-root` to defaults. v2 commands now warn; v1 syntax
      fails outright. Rekor v2 transparency log changes the verify
      flow. Skills teaching `cosign sign-blob` / `cosign verify` need
      bundle-format flag updates and Rekor v2 readiness notes.

